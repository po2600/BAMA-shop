
<!DOCTYPE html>
<html>
<head>
  <title>BAMA Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      text-align: center;
    }

    h2 {
      background: black;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .item {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border-radius: 5px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>BAMA Active Wears</h2>

<div class="item">
  <img src="https://via.placeholder.com/300x200?text=T-Shirt">
  <h3>T-Shirt</h3>
  <p>Price: $10</p>
  <button onclick="buy('T-Shirt - $10')">Buy</button>
</div>

<div class="item">
  <img src="https://via.placeholder.com/300x200?text=Hoodie">
  <h3>Hoodie</h3>
  <p>Price: $20</p>
  <button onclick="buy('Hoodie - $20')">Buy</button>
</div>

<div class="item">
  <img src="https://via.placeholder.com/300x200?text=Jacket">
  <h3>Jacket</h3>
  <p>Price: $30</p>
  <button onclick="buy('Jacket - $30')">Buy</button>
</div>

<script>
function buy(item) {
  Telegram.WebApp.sendData(item);
}
</script>

</body>
</html>
